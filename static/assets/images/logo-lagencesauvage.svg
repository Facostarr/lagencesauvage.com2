<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 60" fill="none">
  <!-- Carré arrondi indigo -->
  <rect x="2" y="2" width="56" height="56" rx="12" fill="#4F46E5"/>
  <!-- S géométrique style C2 — formes pleines angulaires -->
  <!-- Partie haute du S : flèche vers la droite -->
  <path d="M18 14h16l10 10-6 6H22l-4-4v-8z" fill="#FFFFFF"/>
  <!-- Partie médiane : liaison diagonale -->
  <path d="M38 24l-14 12" stroke="#FFFFFF" stroke-width="0" fill="none"/>
  <path d="M32 22l-8 8 8 8h6l-8-8 8-8z" fill="rgba(255,255,255,0.7)"/>
  <!-- Partie basse du S : flèche vers la gauche -->
  <path d="M42 46H26l-10-10 6-6h16l4 4v8z" fill="#FFFFFF"/>
  <!-- Texte "L'Agence" en DM Sans léger -->
  <text x="70" y="25" font-family="'DM Sans', system-ui, sans-serif" font-weight="400" font-size="16" letter-spacing="0.3" fill="#0F172A">L'Agence</text>
  <!-- Texte "Sauvage" en DM Sans bold -->
  <text x="70" y="48" font-family="'DM Sans', system-ui, sans-serif" font-weight="700" font-size="26" fill="#0F172A">Sauvage</text>
</svg>
