<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Carré arrondi indigo -->
  <rect x="4" y="4" width="56" height="56" rx="8" fill="#4F46E5"/>
  <!-- S géométrique C2 : deux formes séparées par une bande diagonale -->
  <g fill="#FFFFFF">
    <!-- Haut du S : trapèze upper-left, plein en haut, pointe vers le centre-droit -->
    <path d="M 14,11 L 50,11 L 50,23 L 20,35 L 14,35 Z"/>
    <!-- Bas du S : trapèze lower-right, plein en bas, pointe vers le centre-gauche -->
    <path d="M 50,53 L 14,53 L 14,41 L 44,29 L 50,29 Z"/>
  </g>
</svg>
