# =============================================================================
# L'AGENCE SAUVAGE - Configuration Hugo
# Optimisé SEO + GEO (Generative Engine Optimization)
# =============================================================================

baseURL = "https://www.lagencesauvage.com"
languageCode = "fr-FR"
defaultContentLanguage = "fr"
title = "L'Agence Sauvage | IA & Automatisation pour TPE/PME"

# Pretty URLs (sans extension .html) — redirections 301 dans vercel.json
# uglyURLs supprimé — voir mapping complet dans docs/playbook-refonte.md

# Désactiver les pages inutiles
disableKinds = ["taxonomy", "term"]

# Activer les taxonomies pour catégories et tags
[taxonomies]
  category = "categories"
  tag = "tags"

# Configuration des permalinks
[permalinks]
  blog = "/blog/:contentbasename"
  categories = "/blog/categories/:slug/"
  tags = "/blog/tags/:slug/"

# =============================================================================
# SITEMAP AUTOMATIQUE - Toutes les pages indexées
# =============================================================================
[sitemap]
  changefreq = "weekly"
  priority = 0.7
  filename = "sitemap.xml"

# Format des dates en français
[frontmatter]
  date = ["date", "publishDate"]
  lastmod = ["lastmod", ":git", "date"]

# Markdown - Rendu optimisé
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      typographer = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false
  [markup.highlight]
    codeFences = true
    lineNos = false
    style = "monokai"

# Minification pour la performance
[minify]
  disableCSS = false
  disableHTML = false
  disableJS = false
  disableJSON = false
  disableSVG = false
  disableXML = false
  minifyOutput = true

# Build
[build]
  writeStats = false

# Caching des assets
[caches]
  [caches.assets]
    dir = ":resourceDir/_gen"
    maxAge = "720h"
  [caches.images]
    dir = ":resourceDir/_gen"
    maxAge = "720h"

# Sécurité
[security]
  [security.exec]
    allow = ["^dart-sass-embedded$", "^go$", "^node$", "^npx$", "^postcss$"]
  [security.funcs]
    getenv = ["^HUGO_", "^CI$"]
  # Hugo >=0.163 active par défaut le modèle de permissions Node, qui bloque le
  # chargement de l'addon natif lightningcss (tiré par Tailwind v4) avec
  # "loading addons is disabled". On désactive ce durcissement (comportement
  # d'avant 0.163) — sans risque, c'est un outil de build local/CI de confiance.
  [security.node]
    [security.node.permissions]
      disable = true
