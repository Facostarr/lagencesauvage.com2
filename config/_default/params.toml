# =============================================================================
# Paramètres du site - SEO & GEO Optimisés
# =============================================================================

# Informations de base
description = "L'Agence Sauvage : IA accessible pour TPE/PME. Automatisation, agents conversationnels et marketing IA. Budget stagiaire, performance Sauvage !"
keywords = ["IA TPE PME", "automatisation", "agents IA", "n8n", "marketing automation", "intelligence artificielle entreprise"]
author = "L'Agence Sauvage"

# Images par défaut
defaultImage = "/assets/images/og-default.jpg"
logo = "/assets/images/Logo-Agence-Sauvage.svg"
favicon = "/assets/images/favicon.svg"

# Réseaux sociaux
[social]
  linkedin = "https://www.linkedin.com/company/lagencesauvage"
  twitter = ""

# Contact
[contact]
  email = "hello@lagencesauvage.com"
  phone = "+33 1 85 09 75 92"
  address = "Paris, France"

# Organisation (Schema.org)
[organization]
  name = "L'Agence Sauvage"
  legalName = "L'Agence Sauvage"
  url = "https://www.lagencesauvage.com"
  logo = "https://www.lagencesauvage.com/assets/images/Logo-Agence-Sauvage.svg"
  foundingDate = "2025"
  description = "Agence spécialisée en intelligence artificielle et automatisation pour les TPE/PME françaises. Nous rendons l'IA accessible avec des solutions à budget maîtrisé."
  slogan = "L'IA accessible pour les entreprises. Budget stagiaire, performance Sauvage !"
  areaServed = "France"
  priceRange = "€€"
  
  # Adresse
  [organization.address]
    streetAddress = "47 Rue Berger"
    addressLocality = "Paris"
    addressRegion = "Île-de-France"
    postalCode = "75001"
    addressCountry = "FR"

# Personne (Schema.org) — entité canonique du fondateur (E-E-A-T / GEO)
# Source unique réutilisée par schema/person.html via @id #franck-sauvage
[person]
  name = "Franck Sauvage"
  jobTitle = "Fondateur"
  description = "Entrepreneur et expert B2B SaaS avec plus de 20 ans d'expérience. Fondateur de L'Agence Sauvage, agence d'automatisation IA pour les TPE/PME françaises."
  url = "https://www.lagencesauvage.com/about/"
  image = "https://www.lagencesauvage.com/assets/images/franck-sauvage.jpg"
  alumniOf = "NEOMA Business School"
  linkedin = "https://www.linkedin.com/in/franck-sauvage/"
  knowsAbout = ["SaaS B2B", "Automatisation IA", "Vente complexe", "Process métier", "n8n", "Claude (Anthropic)", "Intelligence artificielle pour PME"]

# Auteur par défaut des articles
[defaultAuthor]
  name = "L'Agence Sauvage"
  url = "https://www.lagencesauvage.com/about/"
  expertise = "Spécialiste IA & Automatisation pour TPE/PME"

# Configuration du blog
[blog]
  title = "Blog"
  description = "Guides pratiques, cas clients et astuces IA & Automatisation pour booster la productivité de votre TPE/PME."
  postsPerPage = 9
  showReadingTime = true
  showToc = true
  showDate = true
  showLastmod = true
  showAuthor = true
  showShare = true
  showRelated = true

# SEO avancé
[seo]
  enableRobotsTxt = true
  enableSitemap = true
  enableRSS = true
  twitterCard = "summary_large_image"
  ogType = "article"

# Analytics (Plausible)
[analytics]
  plausibleDomain = "lagencesauvage.com"
  plausibleSrc = "https://plausible.io/js/script.js"

# GEO (Generative Engine Optimization)
[geo]
  # Activer les optimisations pour les moteurs IA
  enableSchemaArticle = true
  enableSchemaFAQ = true
  enableSchemaHowTo = true
  enableSchemaOrganization = true
  # Fraîcheur du contenu
  showLastModified = true
  showPublishDate = true
