{{/* Schema.org AboutPage — référence l'entité Person canonique (cf. schema/person.html)
   et l'Organization, toutes deux émises via baseof.html. */}}
<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "AboutPage",
    "@id": "{{ .Permalink }}#aboutpage",
    "url": "{{ .Permalink }}",
    "name": "{{ .Title }}",
    "mainEntity": {
        "@id": "{{ .Site.BaseURL }}#franck-sauvage"
    },
    "about": {
        "@id": "{{ .Site.BaseURL }}#organization"
    }
}
</script>
